      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: 센서
            heading_style: title
            icon: mdi:gauge
          - type: custom:mini-graph-card
            name: 코팅실 온습도
            icon: mdi:home-thermometer
            hours_to_show: 24
            line_width: 3
            height: 100
            entities:
              - entity: sensor.0x70d07efffeddfe27_temperature
                name: 온도
                color: '#ff9800'
              - entity: sensor.0x70d07efffeddfe27_humidity
                name: 습도
                color: '#03a9f4'
                show_state: true
                y_axis: secondary
          - graph: line
            type: sensor
            entity: sensor.0x00158d0005bbcfd9_power
            detail: 1
            card_mod:
              style: >
                ha-card { background: var(--ha-card-background,
                var(--card-background-color)); border-radius: 20px; border:
                none; box-shadow: none; }
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.0x70d07efffeddfe27_battery
                content_info: name
              - type: entity
                entity: sensor.onseubdo_senseo_2_battery
                content_info: name
              - type: entity
                entity: sensor.0x5c0272fffed1edff_battery
                content_info: name
              - type: entity
                entity: sensor.0x286d970001158fb0_battery
                content_info: name
              - type: entity
                entity: sensor.0xa4c1384660be5237_battery
                content_info: name
            card_mod:
              style: |
                ha-card { --ha-card-background: transparent; }
          - type: tile
            entity: sensor.0x54ef4410001e9b11_device_temperature
            card_mod:
              style: >
                ha-card { background: var(--ha-card-background,
                var(--card-background-color)); border-radius: 20px; border:
                none; box-shadow: none; }
          - type: tile
            entity: binary_sensor.0x54ef4410001e9b11_occupancy
            features:
              - type: toggle
            card_mod:
              style: >
                ha-card { background: var(--ha-card-background,
                var(--card-background-color)); border-radius: 20px; border:
                none; box-shadow: none; }
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: 팝업 (제어/예약)
            heading_style: subtitle
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#jeondeung'
                entity: switch.kotingsil2_jeondeung
                button_type: name
                name: >-
                  {{ state_attr(config.entity, 'friendly_name') or config.entity
                  }}
                icon: mdi:lightbulb
                show_header: false
                bg_opacity: '80'
                bg_blur: '14'
                bg_color: var(--card-background-color)
                show_state: true
                width_desktop: 540px
                width_mobile: 100vw
                margin_top_desktop: 12vh
                margin_top_mobile: 0px
                tap_action:
                  action: toggle
                styles: |
                  .bubble-pop-up,
                  .bubble-pop-up-container,
                  .bubble-pop-up.is-popup-visible {
                    animation: none !important;
                    transition: none !important;
                  }
                  @media (max-width: 768px) {
                    .bubble-pop-up {
                      height: calc(100vh - 2vh) !important;
                      border-radius: 24px !important;
                      margin-bottom: 0 !important;
                    }
                  }
                  .bubble-button-card-container {
                    border-radius: 14px !important;
                    transition: background 0.25s ease !important;
                    padding: 4px 10px !important;
                    background: ${state === 'on' ? 'var(--secondary-background-color)' : 'transparent'} !important;
                  }
                  .bubble-icon {
                    color: ${state === 'on' ? '#00C853' : 'var(--secondary-text-color)'} !important;
                  }
                  .bubble-header-container {
                    display: flex !important;
                    flex-direction: row !important;
                    align-items: center !important;
                    gap: 8px !important;
                  }
                  .bubble-button-card-container {
                    order: 2 !important;
                    flex: 1 !important;
                  }
                  .bubble-previous-button-container,
                  .bubble-previous-button {
                    order: 1 !important;
                  }
                  .bubble-close-button-container,
                  .bubble-close-button {
                    order: 3 !important;
                  }
              - type: horizontal-stack
                card_mod:
                  style: |
                    #root {
                      display: grid !important;
                      grid-template-columns: 48px 1fr 48px !important;
                      grid-auto-columns: unset !important;
                      gap: 8px !important;
                    }
                cards:
                  - type: custom:mushroom-template-card
                    icon: mdi:arrow-left
                    icon_color: grey
                    tap_action:
                      action: navigate
                      navigation_path: '#'
                    card_mod:
                      style: >
                        ha-card { background: transparent !important;
                        box-shadow: none !important; border: none !important;
                        padding: 0 !important; width: 48px !important;
                        min-width: 48px !important; max-width: 48px !important;
                        }

                        mushroom-shape-icon { --shape-color: transparent
                        !important; }
                  - type: custom:mushroom-template-card
                    entity: switch.kotingsil2_jeondeung
                    icon: mdi:lightbulb
                    primary: '{{ state_attr(entity, ''friendly_name'') }}'
                    tap_action:
                      action: toggle
                    card_mod:
                      style: |
                        ha-card {
                          background: {% if is_state('switch.kotingsil2_jeondeung', 'on') %}#FFB300{% else %}var(--secondary-background-color){% endif %} !important;
                          border-radius: 14px;
                          box-shadow: none;
                          border: none;
                          transition: background 0.25s ease;
                          {% if is_state('switch.kotingsil2_jeondeung', 'on') %}
                          --primary-text-color: #000;
                          --secondary-text-color: #000;
                          --card-primary-color: #000;
                          --icon-color: #000;
                          --shape-color: rgba(0,0,0,0.12);
                          {% endif %}
                          font-size: 16px;
                          font-weight: 600;
                        }
                  - type: custom:mushroom-template-card
                    icon: mdi:close
                    icon_color: grey
                    tap_action:
                      action: navigate
                      navigation_path: '#'
                    card_mod:
                      style: >
                        ha-card { background: transparent !important;
                        box-shadow: none !important; border: none !important;
                        padding: 0 !important; width: 48px !important;
                        min-width: 48px !important; max-width: 48px !important;
                        }

                        mushroom-shape-icon { --shape-color: transparent
                        !important; }
              - type: history-graph
                hours_to_show: 24
                entities:
                  - entity: switch.kotingsil2_jeondeung
                    name: 전원 상태
              - type: custom:mushroom-template-card
                primary: 타이머 설정
                secondary: ''
                icon: mdi:timer-outline
                icon_color: amber
                layout: horizontal
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: '#jeondeung_timer'
                card_mod:
                  style: >
                    ha-card { background: var(--secondary-background-color);
                    border-radius: 14px; box-shadow: none; border: none; }

                    ha-card:after { content: '\203A'; position: absolute; right:
                    18px; top: 50%; transform: translateY(-50%); font-size:
                    22px; color: var(--secondary-text-color); }
              - type: custom:mushroom-template-card
                primary: 스케줄 예약
                secondary: ''
