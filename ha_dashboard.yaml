views:
  - title: 코팅/현장/사무실
    type: sections
    layout:
      width: 300
      max_cols: 4
    icon: mdi:factory
    cards: []
    badges: []
    max_columns: 4
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: 스위치
            heading_style: title
            icon: mdi:toggle-switch
          - type: tile
            entity: switch.kotingsil2_jeondeung
            icon: mdi:lightbulb
            tap_action:
              action: navigate
              navigation_path: '#jeondeung'
            icon_tap_action:
              action: none
            vertical: true
            features:
              - type: toggle
            card_mod:
              variables:
                main_entity: switch.kotingsil2_jeondeung
                timer_entity: timer.kotingsil2_jeondeung_taimeo
              style:
                ha-tile-info$: >
                  .primary { font-weight: 600 !important; font-size: 15px
                  !important; text-align: center !important; white-space: normal
                  !important; overflow: hidden !important; display: -webkit-box
                  !important; -webkit-line-clamp: 2 !important;
                  -webkit-box-orient: vertical !important; line-height: 1.2
                  !important; word-break: break-word !important; color:
                  var(--secondary-text-color) !important; {% if
                  is_state(main_entity, 'on') %} color:
                  var(--primary-text-color) !important; {% endif %} }

                  .secondary { display: none !important; }

                  .info { padding: 0 !important; }

                  @media (max-width: 768px) {
                    .primary { font-size: 13px !important; line-height: 1.15 !important; }
                  }
                .: >-
                  ha-card { background: var(--ha-card-background,
                  var(--card-background-color)); border-radius: 20px; border:
                  none; outline: none; box-shadow: none; transition: background
                  0.2s ease, box-shadow 0.2s ease; {% if is_state(main_entity,
                  'on') %} background: var(--secondary-background-color); {%
                  endif %} {% if is_state(timer_entity, 'active') %} box-shadow:
                  inset 0 0 0 2px #FF9800; {% endif %} }

                  ha-card:focus, ha-card:focus-visible, ha-card:active {
                  outline: none !important; border: none !important; }

                  ha-tile-icon { {% if is_state(main_entity, 'on') %}
                  --tile-color: #00C853 !important; {% endif %} }
            grid_options:
              rows: 2
              columns: 6
          - type: tile
