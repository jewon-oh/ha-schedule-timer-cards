blueprint:
  name: "스마트 스케쥴러 자동화 브릿지"
  description: "Schedule UI 전용 연동 템플릿입니다. 스케쥴(일정) 헬퍼의 시간 블록에 따라 타겟 기기를 완벽하게 켜고 끕니다."
  domain: automation
  input:
    schedule_helper:
      name: 스케쥴 도우미 (필수)
      description: 카드에서 제어하고 있는 스케쥴 엔티티를 선택하세요.
      selector:
        entity:
          domain: schedule

    target_device:
      name: 대상 기기 (필수)
      description: 스케쥴 시간에 맞춰 실제로 켜지고 꺼질 기기(전등, 스위치, 스마트 홈 기기 등)를 선택하세요.
      selector:
        entity: {} # 모든 도메인(switch, light 등) 허용

trigger:
  - platform: state
    entity_id: !input schedule_helper
    to: "on"
    id: "schedule_started"
  - platform: state
    entity_id: !input schedule_helper
    to: "off"
    id: "schedule_ended"
  # HA 재시작·자동화 reload 직후 schedule이 이미 on이면 대상 기기를 켜 stale을 막는다.
  # 단, 시작 시 OFF 동기화는 하지 않는다 — 재부팅(정전·메모리부족·업데이트 등)만으로
  # schedule이 off인 기기를 전부 꺼버리는 문제(#15)를 피하기 위함. 실제 off 전환은
  # 아래 schedule_ended(state -> off) 트리거가 담당한다.
  - platform: homeassistant
    event: start
    id: "sync_on_start"

action:
  - choose:
      # schedule이 진입(transition) 또는 시작 시 이미 on이면 → 대상 기기 켜기
      - conditions:
          - or:
              - condition: trigger
                id: schedule_started
              - and:
                  - condition: trigger
                    id: sync_on_start
                  - condition: state
                    entity_id: !input schedule_helper
                    state: "on"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: !input target_device

      # schedule이 종료(transition)되면 → 대상 기기 끄기.
      # 시작 시(sync_on_start) OFF 동기화는 일부러 제외한다(#15).
      - conditions:
          - condition: trigger
            id: schedule_ended
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_device

mode: single
