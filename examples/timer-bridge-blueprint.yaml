blueprint:
  name: "스마트 타이머 자동화 브릿지"
  description: >-
    Timer UI 전용 연동 템플릿입니다. 타이머가 끝나면 선택한 동작(켜기/끄기/상태 반전)을
    대상 기기에 실행합니다. 시작 시에는 기기를 건드리지 않습니다 (종료 시에만 동작).
  domain: automation
  input:
    timer_helper:
      name: 타이머 도우미 (필수)
      description: 카드에서 제어하고 있는 타이머 엔티티를 선택하세요.
      selector:
        entity:
          domain: timer

    target_device:
      name: 대상 기기 (필수)
      description: 타이머가 끝났을 때 제어할 기기를 선택하세요.
      selector:
        entity: {} # 모든 도메인(switch, light 등) 허용

    action_type:
      name: 종료 시 동작
      description: 타이머가 끝났을 때 어떤 동작을 할지 선택하세요.
      default: "turn_off"
      selector:
        select:
          options:
            - label: "기기 끄기 (Turn Off)"
              value: "turn_off"
            - label: "기기 켜기 (Turn On)"
              value: "turn_on"
            - label: "상태 반전 (Toggle)"
              value: "toggle"

variables:
  action_type: !input action_type

# 타이머가 끝났을 때만 트리거 — 시작/상태변화에는 반응하지 않으므로
# "시작하자마자 켜짐/꺼짐"이나 발진(피드백 루프)이 발생할 수 없다.
trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: !input timer_helper
    id: "timer_finished"

action:
  - service: "homeassistant.{{ action_type }}"
    target:
      entity_id: !input target_device

mode: single
