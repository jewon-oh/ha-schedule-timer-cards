<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Custom Schedule Card Preview (v1.4)</title>
  <style>
    body {
      background-color: #1c1c1c;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      --primary-color: #03a9f4;
      --card-background-color: rgba(255, 255, 255, 0.05);
      --divider-color: rgba(255, 255, 255, 0.1);
      --primary-text-color: #ffffff;
      --secondary-text-color: #a0a0a0;
      --error-color: #f44336;
    }
    #preview-container {
      width: 100%;
      max-width: 500px;
      margin-top: 40px;
      padding: 20px;
    }
    .toolbar {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    ha-icon { display: inline-block; width: 24px; height: 24px; }
  </style>
  <script type="module" src="../timer-schedule-card.js"></script>
</head>
<body>
  <div id="preview-container">
    <div class="toolbar">
      <span>Mock HA Environment</span>
      <select id="langSwitch" onchange="switchLang(this.value)">
        <option value="ko">한국어 (KO)</option>
        <option value="en">English (EN)</option>
      </select>
    </div>
    <ha-custom-schedule-card id="myCard"></ha-custom-schedule-card>
  </div>

  <script>
    // ── Mock ha-icon (emoji fallback) ────────────────────────────────────
    class HaIcon extends HTMLElement {
      connectedCallback() {
        const icon = this.getAttribute('icon') || '';
        let emoji = '⚙️';
        if (icon.includes('trash')) emoji = '🗑️';
        if (icon.includes('plus')) emoji = '+';
        if (icon.includes('calendar')) emoji = '📅';
        if (icon.includes('lightbulb')) emoji = '💡';
        if (icon.includes('clock')) emoji = '⏰';
        this.innerHTML = `<span style="font-size: 1.2rem;">${emoji}</span>`;
      }
    }
    customElements.define('ha-icon', HaIcon);

    // ── Mock schedule storage (v1.4-friendly: weekday-only) ──────────────
    // 월~금에만 시간 블록이 있고 주말은 비어있다.
    // _hydrateFromSchedule 가 active_days = [0,1,2,3,4] 로 추론한다.
    const WEEKDAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const weekdayBlocks = [
      { from: '07:00:00', to: '09:00:00' },
      { from: '18:00:00', to: '23:00:00' },
    ];
    const storageId = 'mock_livingroom_light';
    const entityId  = `schedule.${storageId}`;
    const mockSchedule = {
      id: storageId,
      name: '거실 전등 자동화 스케쥴',
      icon: 'mdi:lightbulb',
      monday: [...weekdayBlocks],
      tuesday: [...weekdayBlocks],
      wednesday: [...weekdayBlocks],
      thursday: [...weekdayBlocks],
      friday: [...weekdayBlocks],
      saturday: [],
      sunday: [],
    };

    const hass = {
      language: 'ko',
      states: {
        [entityId]: {
          entity_id: entityId,
          state: 'off',
          attributes: { friendly_name: mockSchedule.name },
        },
      },
      callWS: async (payload) => {
        // v1.4 카드가 schedule/list 결과를 배열로 받아 .find(...) 한다.
        if (payload.type === 'schedule/list') {
          return [mockSchedule];
        }
        // unique_id 가 있어야 1차 매칭이 성공한다.
        if (payload.type === 'config/entity_registry/get' && payload.entity_id === entityId) {
          return { entity_id: entityId, unique_id: storageId };
        }
        // 저장 호출은 mockSchedule을 in-place 업데이트해서 다음 schedule/list 결과에 반영.
        if (payload.type === 'schedule/update' && payload.schedule_id === storageId) {
          for (const d of WEEKDAYS) {
            if (Array.isArray(payload[d])) mockSchedule[d] = payload[d];
          }
          return mockSchedule;
        }
        return {};
      },
    };

    document.addEventListener('DOMContentLoaded', () => {
      const card = document.getElementById('myCard');
      card.setConfig({
        type: 'custom:ha-custom-schedule-card',
        entity: entityId,
      });
      card.hass = { ...hass };
    });

    window.switchLang = function (lang) {
      hass.language = lang;
      document.getElementById('myCard').hass = { ...hass };
    };
  </script>
</body>
</html>
