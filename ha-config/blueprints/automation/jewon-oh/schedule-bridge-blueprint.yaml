blueprint:
  name: "스마트 스케쥴러 자동화 브릿지"
  description: "Schedule UI 전용 연동 템플릿입니다. 스케쥴(일정) 헬퍼의 시간 블록에 따라 타겟 기기를 완벽하게 켜고 끕니다."
  domain: automation
  input:
    schedule_helper:
      name: 스케쥴 도우미 (필수)
      description: 카드에서 제어하고 있는 스케쥴 엔티티를 선택하세요.
      selector:
        entity:
          domain: schedule

    target_device:
      name: 대상 기기 (필수)
      description: 스케쥴 시간에 맞춰 실제로 켜지고 꺼질 기기(전등, 스위치, 스마트 홈 기기 등)를 선택하세요.
      selector:
        entity: {} # 모든 도메인(switch, light 등) 허용

trigger:
  - platform: state
    entity_id: !input schedule_helper
    to: "on"
    id: "schedule_started"
  - platform: state
    entity_id: !input schedule_helper
    to: "off"
    id: "schedule_ended"
  # HA 재시작·자동화 reload 직후 schedule 상태와 대상 기기를 동기화한다.
  # 이게 없으면 자동화가 처음 등록될 때 schedule이 이미 on/off 상태라면
  # transition을 잡지 못해 대상 기기가 stale 상태로 남는다.
  - platform: homeassistant
    event: start
    id: "sync_on_start"

action:
  - choose:
      # schedule이 진입(transition) 또는 시작 시 이미 on이면 → 대상 기기 켜기
      - conditions:
          - or:
              - condition: trigger
                id: schedule_started
              - and:
                  - condition: trigger
                    id: sync_on_start
                  - condition: state
                    entity_id: !input schedule_helper
                    state: "on"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: !input target_device

      # schedule이 종료(transition) 또는 시작 시 이미 off이면 → 대상 기기 끄기
      - conditions:
          - or:
              - condition: trigger
                id: schedule_ended
              - and:
                  - condition: trigger
                    id: sync_on_start
                  - condition: state
                    entity_id: !input schedule_helper
                    state: "off"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_device

mode: single
