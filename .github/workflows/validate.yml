name: Validate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: plugin

  hassfest:
    name: Hassfest (skip-non-integration)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Hassfest is for integrations, not plugins; kept disabled."
